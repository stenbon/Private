name: Dzen Auto Publisher

on:
  schedule:
    - cron: '0 22 * * *'   # 01:00 МСК
    - cron: '0 2 * * *'    # 05:00 МСК
    - cron: '0 11 * * *'   # 14:00 МСК
  workflow_dispatch:        # ручной запуск через кнопку в GitHub

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq requests python-dotenv gspread google-auth

      - name: Run publisher
        env:
          WP_URL:               ${{ secrets.WP_URL }}
          WP_USER:              ${{ secrets.WP_USER }}
          WP_APP_PASS:          ${{ secrets.WP_APP_PASS }}
          WP_CATEGORY:          ${{ secrets.WP_CATEGORY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CREDENTIALS:   ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python dzen_publisher.py
